name: Pre-bake popular voice actors

# Weekly refresh of data/va/<id>.json snapshots for the VAs listed in
# data/popular-vas.json. Opens a PR so changes land with a review rather than
# being force-pushed by an automation.
#
# Manual trigger: Actions → "Pre-bake popular voice actors" → Run workflow.
on:
    schedule:
        # Sundays at 06:00 UTC — outside AniList's busiest hours.
        - cron: "0 6 * * 0"
    workflow_dispatch: {}

permissions:
    contents: write
    pull-requests: write

jobs:
    prebake:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: "20"

            - name: Run prebake script
              env:
                  # Optional: add ANILIST_APP_TOKEN as a repository secret for
                  # higher rate limits. The script works without it.
                  ANILIST_APP_TOKEN: ${{ secrets.ANILIST_APP_TOKEN }}
              run: node scripts/prebake.mjs

            - name: Open PR with updated snapshots
              uses: peter-evans/create-pull-request@v6
              with:
                  branch: automated/prebake-refresh
                  commit-message: "chore(data): refresh pre-baked VA snapshots"
                  title: "chore(data): refresh pre-baked VA snapshots"
                  body: |
                      Weekly automated refresh of `data/va/*.json` from AniList.

                      Generated by `.github/workflows/prebake.yml` →
                      `scripts/prebake.mjs`. Review the diff and merge if the
                      changes look sensible (mostly new recent-year roles).
                  add-paths: |
                      data/va/*.json
                      data/va-manifest.json
